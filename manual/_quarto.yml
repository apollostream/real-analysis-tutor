project:
  type: book
  output-dir: _site

book:
  title: "Real Analysis Tutor — Developer's Manual"
  author: "Methodology & tutor system: Don Kearney"
  date: today
  output-file: real-analysis-tutor-manual
  downloads: [pdf]
  repo-url: https://github.com/apollostream/real-analysis-tutor
  chapters:
    - index.qmd
    - pedagogy.qmd
    - architecture.qmd
    - generality.qmd
    - extending.qmd
    - reference.qmd
    - faq.qmd
    - bibliography.qmd

format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    toc: true
  pdf:
    documentclass: scrreprt
    colorlinks: true
    geometry: [margin=0.9in]
    include-in-header:
      text: |
        \setlength{\emergencystretch}{3em}
